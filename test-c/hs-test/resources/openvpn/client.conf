# OpenVPN TLS-Crypt-V2 client configuration
dev tun
proto udp
remote 10.10.2.2 1001
resolv-retry infinite
nobind
persist-key
persist-tun
tls-client

# TLS configuration
ca /etc/openvpn/ca.crt
cert /etc/openvpn/client.crt
key /etc/openvpn/client.key

# TLS-Crypt-V2 client key (unique per-client wrapped key)
tls-crypt-v2 /etc/openvpn/tls-crypt-v2-client.key

# Cipher and auth
cipher AES-256-GCM
auth SHA256

# Manual tunnel IP configuration
ifconfig 10.8.0.2 10.8.0.1

# Verbosity
verb 5

# Log file
log /tmp/openvpn/client.log
status /tmp/openvpn/status.log 5
